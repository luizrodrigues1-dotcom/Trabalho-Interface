<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contato</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Entre em Contato</h1>

<video controls width="300">
<source src="./VIDEOS/Video1.mp4" type="video/mp4">
</video>

<audio controls>
<source src="./AUDIOS/sertanejo.mp4" type="audio/mp4">
</audio>

<form>
<fieldset>
<legend>Cadastro</legend>

<input type="text" placeholder="Nome"><br>
<input type="email" placeholder="Email"><br>
<input type="tel" placeholder="Telefone"><br>

<!-- Radio -->
<p>Tipo de Interesse:</p>
<label><input type="radio" name="tipo"> Compra</label>
<label><input type="radio" name="tipo"> Venda</label><br>

<!-- Checkbox -->
<p>Preferências:</p>
<label><input type="checkbox"> Pecuária</label>
<label><input type="checkbox"> Agricultura</label>
<label><input type="checkbox"> Lazer</label><br>

<select>
<option>Até R$ 1 milhão</option>
<option>Até R$ 5 milhões</option>
<option>Acima de R$ 10 milhões</option>
</select><br><br>

<textarea placeholder="Mensagem"></textarea><br><br>

<button type="submit">Enviar</button>
<button type="reset">Resetar</button>

</fieldset>
</form>

<a href="index.html">Voltar</a>

</body>
</html>
